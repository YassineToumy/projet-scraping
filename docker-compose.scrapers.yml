# ============================================================
# Scraper — Single container with internal cron
# All scrapers run inside one container triggered by cron
# Dokploy compatible — no Docker-in-Docker needed
# ============================================================

services:
  scrapers:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - POSTGRES_DSN=${POSTGRES_DSN}
      - MONGO_BIENICI_DB=${MONGO_BIENICI_DB}
      - MONGO_BIENICI_COL_RAW=${MONGO_BIENICI_COL_RAW}
      - MONGO_BIENICI_COL_CLEAN=${MONGO_BIENICI_COL_CLEAN}
      - MONGO_BIENICI_COL_PROGRESS=${MONGO_BIENICI_COL_PROGRESS}
      - MONGO_MUBAWAB_DB=${MONGO_MUBAWAB_DB}
      - MONGO_MUBAWAB_COL=${MONGO_MUBAWAB_COL}
      - MONGO_PROPERTYFINDER_DB=${MONGO_PROPERTYFINDER_DB}
      - MONGO_PROPERTYFINDER_COL=${MONGO_PROPERTYFINDER_COL}
      - MONGO_MKTLIST_DB=${MONGO_MKTLIST_DB}
      - MONGO_MKTLIST_COL=${MONGO_MKTLIST_COL}
      - PG_TABLE_BIENICI=${PG_TABLE_BIENICI}
      - PG_TABLE_MUBAWAB=${PG_TABLE_MUBAWAB}
      - PG_TABLE_PROPERTYFINDER=${PG_TABLE_PROPERTYFINDER}
      - PG_TABLE_MKTLIST=${PG_TABLE_MKTLIST}
      - PG_ARCHIVE_BIENICI=${PG_ARCHIVE_BIENICI}
      - PG_ARCHIVE_MUBAWAB=${PG_ARCHIVE_MUBAWAB}
      - PG_ARCHIVE_PROPERTYFINDER=${PG_ARCHIVE_PROPERTYFINDER}
      - PG_ARCHIVE_MKTLIST=${PG_ARCHIVE_MKTLIST}
      - CYCLE_SLEEP=${CYCLE_SLEEP:-86400}
      - BATCH_SIZE=${BATCH_SIZE:-500}
      - ALERT_WEBHOOK=${ALERT_WEBHOOK:-}
      - TZ=UTC
    volumes:
      - scraper-logs:/app/logs

volumes:
  scraper-logs: