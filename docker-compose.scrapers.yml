# ============================================================
# Scraper Orchestration — Dokploy Compatible
# Server: 187.77.168.42
#
# Only the scheduler runs permanently.
# Scrapers are triggered by scheduler.sh via docker exec/run.
# ============================================================

x-common-env: &common-env
  MONGODB_URI: ${MONGODB_URI}
  POSTGRES_DSN: ${POSTGRES_DSN}
  TZ: UTC

services:

  # ────────────────────────────────────────────
  # SCHEDULER — Cron daemon (only always-on)
  # ────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: scraper-scheduler
    restart: always
    env_file: .env
    environment:
      <<: *common-env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./docker-compose.scrapers.yml:/app/docker-compose.scrapers.yml:ro

  # ────────────────────────────────────────────
  # Bien'ici (France)
  # ────────────────────────────────────────────
  scraper-bienici:
    build:
      context: .
      dockerfile: Dockerfile.scraper-http
    container_name: scraper-bienici
    restart: "no"
    env_file: .env
    environment:
      <<: *common-env
    command: ["echo", "Waiting for cron trigger"]
    volumes:
      - ./bienici_scraper_locations.py:/app/bienici_scraper_locations.py:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ────────────────────────────────────────────
  # Mubawab (Tunisia)
  # ────────────────────────────────────────────
  scraper-mubawab:
    build:
      context: .
      dockerfile: Dockerfile.scraper-http
    container_name: scraper-mubawab
    restart: "no"
    env_file: .env
    environment:
      <<: *common-env
    command: ["echo", "Waiting for cron trigger"]
    volumes:
      - ./scraper_mubawab_locations.py:/app/scraper_mubawab_locations.py:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ────────────────────────────────────────────
  # MktList (Canada)
  # ────────────────────────────────────────────
  scraper-mktlist:
    build:
      context: .
      dockerfile: Dockerfile.scraper-http
    container_name: scraper-mktlist
    restart: "no"
    env_file: .env
    environment:
      <<: *common-env
    command: ["echo", "Waiting for cron trigger"]
    volumes:
      - ./scraper_mktlist_locations.py:/app/scraper_mktlist_locations.py:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ────────────────────────────────────────────
  # PropertyFinder (Egypt) — Playwright headless
  # ────────────────────────────────────────────
  scraper-propertyfinder:
    build:
      context: .
      dockerfile: Dockerfile.scraper-browser
    container_name: scraper-propertyfinder
    restart: "no"
    env_file: .env
    environment:
      <<: *common-env
    command: ["echo", "Waiting for cron trigger"]
    volumes:
      - ./scraper_propertyfinder_locations.py:/app/scraper_propertyfinder_locations.py:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    shm_size: "2gb"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ────────────────────────────────────────────
  # SYNC — MongoDB -> PostgreSQL
  # ────────────────────────────────────────────
  scraper-sync:
    build:
      context: .
      dockerfile: Dockerfile.scraper-http
    container_name: scraper-sync
    restart: "no"
    env_file: .env
    environment:
      <<: *common-env
    command: ["echo", "Waiting for cron trigger"]
    volumes:
      - ./mongo_to_postgre.py:/app/mongo_to_postgre.py:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ────────────────────────────────────────────
  # MONITOR
  # ────────────────────────────────────────────
  scraper-monitor:
    build:
      context: .
      dockerfile: Dockerfile.scraper-http
    container_name: scraper-monitor
    restart: "no"
    env_file: .env
    environment:
      <<: *common-env
    command: ["echo", "Waiting for cron trigger"]
    volumes:
      - ./monitor.py:/app/monitor.py:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"